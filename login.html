<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login • Nova-Fala</title>

<style>
body{
margin:0;
background:#000;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:90%;
max-width:400px;
background:#0a0a0a;
border:1px solid #222;
border-radius:12px;
padding:25px;
box-shadow:0 0 20px rgba(29,161,242,0.3);
}

.logo{
text-align:center;
font-size:28px;
color:#1da1f2;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
background:#000;
border:1px solid #333;
color:white;
border-radius:8px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#1da1f2;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0d95e8;
}

.link{
text-align:center;
margin-top:15px;
}

a{
color:#1da1f2;
text-decoration:none;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">Nova-Fala</div>

<input id="user" placeholder="Usuário">
<input id="pass" type="password" placeholder="Senha">

<button onclick="login()">Entrar</button>

<div class="link">
<a href="registro.html">Criar conta</a>
</div>

</div>

<script>

const DB = "https://contaevilution-default-rtdb.firebaseio.com"

/* ================= SALVAR USUÁRIO ================= */

function salvarUsuario(user){

    // local (persistente)
    localStorage.setItem("user", user)

    // sessão (aba atual)
    sessionStorage.setItem("user", user)

    // cookie (backup)
    let d = new Date()
    d.setTime(d.getTime() + (30*24*60*60*1000))

    document.cookie = "user=" + user + ";expires=" + d.toUTCString() + ";path=/"
}

/* ================= LOGIN ================= */

async function login(){

    try{

        let u = document.getElementById("user").value.trim().toLowerCase()
        let p = document.getElementById("pass").value.trim()

        if(!u || !p){
            alert("Preencha tudo")
            return
        }

        // valida caracteres inválidos
        if(/[.#$/\[\]]/.test(u)){
            alert("Usuário inválido")
            return
        }

        // busca no firebase
        let res = await fetch(DB + "/users/" + u + ".json")

        if(!res.ok){
            let erro = await res.text()
            alert("Erro Firebase: " + erro)
            return
        }

        let data = await res.json()

        console.log("Dados recebidos:", data)

        if(!data){
            alert("Conta não existe")
            return
        }

        if(data.senha !== p){
            alert("Senha incorreta")
            return
        }

        // salvar sessão
        salvarUsuario(u)

        localStorage.removeItem("logoutManual")

        alert("Login realizado 🔥")

        location.href = "index.html"

    }catch(err){

        console.error(err)
        alert("Erro de conexão")

    }

}

/* ================= AUTO LOGIN ================= */

(function(){

    let logoutManual = localStorage.getItem("logoutManual")

    let user =
        localStorage.getItem("user") ||
        sessionStorage.getItem("user") ||
        (document.cookie.match(/(^| )user=([^;]+)/)?.[2])

    if(user && logoutManual !== "true"){
        location.href = "index.html"
    }

})()

</script>

</body>
</html>
