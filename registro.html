<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro • Nova-Fala</title>

<style>
body{
margin:0;
background:#000;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
width:90%;
max-width:400px;
background:#0a0a0a;
border:1px solid #222;
border-radius:12px;
padding:25px;
box-shadow:0 0 20px rgba(29,161,242,0.3);
animation:fadeIn .6s forwards;
}

@keyframes fadeIn{
from{opacity:0;transform:scale(.95);}
to{opacity:1;transform:scale(1);}
}

.logo{
text-align:center;
font-size:28px;
color:#1da1f2;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
background:#000;
border:1px solid #333;
color:white;
border-radius:8px;
}

input:focus{
border-color:#1da1f2;
box-shadow:0 0 10px #1da1f2;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#1da1f2;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0d95e8;
box-shadow:0 0 10px #1da1f2;
}

.link{
text-align:center;
margin-top:15px;
}

a{
color:#1da1f2;
text-decoration:none;
}
</style>
</head>

<body>

<div class="card">

<div class="logo">Nova-Fala</div>

<input id="user" placeholder="Usuário">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Senha">
<input id="pass2" type="password" placeholder="Confirmar senha">
<input id="dob" type="date">

<button onclick="registrar()">Criar conta</button>

<div class="link">
<a href="login.html">Já tenho conta</a>
</div>

</div>

<script>

const DB = "https://contaevilution-default-rtdb.firebaseio.com"

async function registrar(){

try{

let u = document.getElementById("user").value.trim().toLowerCase()
let e = document.getElementById("email").value.trim().toLowerCase()
let p = document.getElementById("pass").value.trim()
let p2 = document.getElementById("pass2").value.trim()
let dob = document.getElementById("dob").value

// validação
if(!u || !e || !p || !p2 || !dob){
alert("Preencha todos os campos")
return
}

// caracteres inválidos no Firebase
if(/[.#$/\[\]]/.test(u)){
alert("Usuário inválido (não use . # $ [ ] / )")
return
}

// idade mínima
let hoje = new Date()
let nasc = new Date(dob)
let idade = hoje.getFullYear() - nasc.getFullYear()
let m = hoje.getMonth() - nasc.getMonth()
if(m < 0 || (m === 0 && hoje.getDate() < nasc.getDate())) idade--

if(idade < 12){
alert("Você precisa ter pelo menos 12 anos")
return
}

// senha
if(p !== p2){
alert("Senhas diferentes")
return
}

// verifica usuário
let checkUser = await fetch(DB + "/users/" + u + ".json")
let userData = await checkUser.json()

if(userData){
alert("Usuário já existe")
return
}

// verifica email
let checkAll = await fetch(DB + "/users.json")
let allUsers = await checkAll.json()

if(allUsers){
for(let key in allUsers){
if(allUsers[key].email === e){
alert("Email já cadastrado")
return
}
}
}

// salvar
let salvar = await fetch(DB + "/users/" + u + ".json",{
method:"PUT",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email:e,
senha:p,
criado:Date.now()
})
})

// debug
let resposta = await salvar.text()
console.log("Firebase:", resposta)

if(!salvar.ok){
alert("Erro ao salvar: " + resposta)
return
}

alert("Conta criada com sucesso 🔥")
location.href="login.html"

}catch(err){
alert("Erro: " + err.message)
console.error(err)
}

}

</script>

</body>
</html>
