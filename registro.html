<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro • Nova-Fala</title>

<style>
body{
margin:0;
background:#000;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
transition: background 0.5s;
}

.card{
width:90%;
max-width:400px;
background:#0a0a0a;
border:1px solid #222;
border-radius:12px;
padding:25px;
box-shadow: 0 0 20px rgba(29,161,242,0.3);
transform: scale(0.95);
opacity:0;
animation: fadeIn 0.6s forwards;
}

@keyframes fadeIn{
0%{opacity:0; transform:scale(0.95);}
100%{opacity:1; transform:scale(1);}
}

.logo{
text-align:center;
font-size:28px;
color:#1da1f2;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
background:#000;
border:1px solid #333;
color:white;
border-radius:8px;
transition: 0.3s;
}

input:focus{
border-color:#1da1f2;
box-shadow:0 0 10px #1da1f2;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#1da1f2;
border:none;
border-radius:8px;
color:white;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0d95e8;
box-shadow:0 0 10px #1da1f2;
}

.link{
text-align:center;
margin-top:15px;
}

a{
color:#1da1f2;
text-decoration:none;
}
</style>

</head>
<body>

<div class="card">

<div class="logo">Nova-Fala</div>

<input id="user" placeholder="Usuário">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Senha">
<input id="pass2" type="password" placeholder="Confirmar senha">
<input id="dob" type="date" placeholder="Data de nascimento">

<button onclick="registrar()">Criar conta</button>

<div class="link">
<a href="login.html">Já tenho conta</a>
</div>

</div>

<script>

const DB="https://contaevilution-default-rtdb.firebaseio.com/users"

async function registrar(){

let u=document.getElementById("user").value.trim()
let e=document.getElementById("email").value.trim().toLowerCase()
let p=document.getElementById("pass").value.trim()
let p2=document.getElementById("pass2").value.trim()
let dob=document.getElementById("dob").value

if(!u||!e||!p||!p2||!dob){
alert("Preencha tudo")
return
}

// Validação idade >= 12 anos
let hoje=new Date()
let nascimento=new Date(dob)
let idade=hoje.getFullYear() - nascimento.getFullYear()
let m=hoje.getMonth() - nascimento.getMonth()
if(m<0 || (m===0 && hoje.getDate() < nascimento.getDate())){
idade--
}
if(idade<12){
alert("Você precisa ter pelo menos 12 anos para criar conta")
return
}

if(p!=p2){
alert("Senhas diferentes")
return
}

let r=await fetch(DB+"/"+u+".json")
let existe=await r.json()

if(existe){
alert("Usuário já existe")
return
}

let r2=await fetch(DB+".json")
let data=await r2.json()

if(data){
for(let nome in data){
if(data[nome].email==e){
alert("Email já usado")
return
}
}
}

await fetch(DB+"/"+u+".json",{
method:"PUT",
body:JSON.stringify({
email:e,
senha:p,
criado:Date.now()
})
})

alert("Conta criada")
location.href="login.html"

}

</script>

</body>
</html>
