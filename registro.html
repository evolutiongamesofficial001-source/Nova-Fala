<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registro • Nova-Fala</title>

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:linear-gradient(180deg,#000,#050505,#000);
font-family:Arial, sans-serif;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* CARD */
.card{
width:90%;
max-width:400px;
background:rgba(10,10,10,0.95);
border:1px solid #1f1f1f;
border-radius:16px;
padding:28px;
box-shadow:0 0 30px rgba(29,161,242,0.25);
animation:fadeIn .6s ease forwards;
backdrop-filter:blur(10px);
}

@keyframes fadeIn{
from{opacity:0;transform:scale(.9);}
to{opacity:1;transform:scale(1);}
}

/* LOGO */
.logo{
text-align:center;
font-size:30px;
font-weight:bold;
color:#1da1f2;
margin-bottom:20px;
letter-spacing:1px;
}

/* INPUTS */
input{
width:100%;
padding:13px;
margin-top:10px;
background:#000;
border:1px solid #2a2a2a;
color:white;
border-radius:10px;
transition:.2s;
font-size:14px;
}

input:focus{
border-color:#1da1f2;
box-shadow:0 0 12px #1da1f2;
outline:none;
transform:scale(1.02);
}

/* BOTÃO */
button{
width:100%;
padding:13px;
margin-top:18px;
background:linear-gradient(45deg,#1da1f2,#0d95e8);
border:none;
border-radius:10px;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.25s;
}

button:hover{
transform:translateY(-2px);
box-shadow:0 0 15px #1da1f2;
}

/* LINK */
.link{
text-align:center;
margin-top:18px;
font-size:14px;
}

a{
color:#1da1f2;
text-decoration:none;
}

a:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<div class="card">

<div class="logo">Nova-Fala</div>

<input id="user" placeholder="Usuário">
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Senha">
<input id="pass2" type="password" placeholder="Confirmar senha">
<input id="dob" type="date">

<button onclick="registrar()">Criar conta</button>

<div class="link">
<a href="login.html">Já tenho conta</a>
</div>

</div>

<script>

const DB = "https://contaevilution-default-rtdb.firebaseio.com"

async function registrar(){

try{

let u = document.getElementById("user").value.trim().toLowerCase()
let e = document.getElementById("email").value.trim().toLowerCase()
let p = document.getElementById("pass").value.trim()
let p2 = document.getElementById("pass2").value.trim()
let dob = document.getElementById("dob").value

// validação
if(!u || !e || !p || !p2 || !dob){
alert("Preencha todos os campos")
return
}

// caracteres inválidos Firebase
if(/[.#$/\[\]]/.test(u)){
alert("Usuário inválido (não use . # $ [ ] / )")
return
}

// idade mínima
let hoje = new Date()
let nasc = new Date(dob)
let idade = hoje.getFullYear() - nasc.getFullYear()
let m = hoje.getMonth() - nasc.getMonth()
if(m < 0 || (m === 0 && hoje.getDate() < nasc.getDate())) idade--

if(idade < 12){
alert("Você precisa ter pelo menos 12 anos")
return
}

// senha
if(p !== p2){
alert("Senhas diferentes")
return
}

// verificar usuário
let checkUser = await fetch(DB + "/users/" + u + ".json")
let userData = null
try{
userData = await checkUser.json()
}catch{}

if(userData){
alert("Usuário já existe")
return
}

// verificar email
let checkAll = await fetch(DB + "/users.json")
let allUsers = null
try{
allUsers = await checkAll.json()
}catch{}

if(allUsers){
for(let key in allUsers){
if(allUsers[key].email === e){
alert("Email já cadastrado")
return
}
}
}

// salvar
let salvar = await fetch(DB + "/users/" + u + ".json",{
method:"PUT",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
email:e,
senha:p,
criado:Date.now()
})
})

let resposta = await salvar.text()

if(!salvar.ok){
alert("Erro ao salvar: " + resposta)
return
}

alert("Conta criada com sucesso 🔥")
location.href="login.html"

}catch(err){
alert("Erro: " + err.message)
console.error(err)
}

}

</script>

</body>
</html>
