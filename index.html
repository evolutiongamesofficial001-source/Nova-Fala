<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nova-Fala</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<style>

:root{
--bg:#0b0b0b;
--card:#121212;
--border:#1f1f1f;
--blue:#1da1f2;
--text:#e8e8e8;
--sub:#9e9e9e;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:system-ui;
background:var(--bg);
color:var(--text);
}

header{
position:sticky;
top:0;
background:#0f0f0f;
padding:14px 16px;
border-bottom:1px solid var(--border);
display:flex;
justify-content:space-between;
align-items:center;
font-size:20px;
font-weight:bold;
color:var(--blue);
z-index:10;
}

.logout{
font-size:13px;
background:#161616;
border:1px solid var(--border);
padding:6px 10px;
border-radius:8px;
cursor:pointer;
color:#ccc;
}

#feed{
padding:10px;
padding-bottom:120px;
}

.post{
background:var(--card);
border:1px solid var(--border);
border-radius:14px;
padding:14px;
margin-bottom:12px;
animation:fade .3s;
}

@keyframes fade{
from{opacity:0;transform:translateY(8px);}
to{opacity:1;}
}

.user{
font-weight:bold;
color:#2ee6a6;
font-size:15px;
}

.text{
margin-top:6px;
font-size:16px;
line-height:1.4;
}

.actions{
margin-top:12px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.actions button{
display:flex;
align-items:center;
gap:6px;
background:#151515;
border:1px solid #262626;
padding:6px 12px;
border-radius:20px;
font-size:13px;
color:#d0d0d0;
cursor:pointer;
transition:0.2s;
}

.actions button:hover{
background:#1d1d1d;
transform:scale(1.05);
}

.actions button:first-child{
color:#ff6b81;
border-color:#2a1a1e;
}

.actions button:first-child:hover{
background:#241317;
}

.actions button:last-child{
color:#5ea2ff;
}

.actions button:last-child:hover{
background:#101826;
}

.comment-box{
margin-top:10px;
border-left:2px solid #1c1c1c;
padding-left:10px;
}

.comment{
margin-top:6px;
font-size:13px;
color:var(--sub);
}

.reply{
margin-left:14px;
font-size:12px;
color:#777;
}

#plus{
position:fixed;
bottom:20px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
background:var(--blue);
color:white;
font-size:34px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
box-shadow:0 8px 25px #000;
transition:.2s;
}

#plus:hover{
transform:scale(1.08);
}

.overlay{
position:fixed;
inset:0;
background:#0009;
display:none;
}

#postPopup{
position:fixed;
bottom:-420px;
left:0;
right:0;
background:#111;
border-top:1px solid var(--border);
padding:18px;
transition:.35s;
border-radius:18px 18px 0 0;
}

#postPopup textarea{
width:100%;
height:90px;
background:#0c0c0c;
border:1px solid var(--border);
border-radius:10px;
color:white;
padding:10px;
font-size:15px;
resize:none;
}

.counter{
font-size:12px;
color:#666;
margin-top:5px;
}

.popupBtns{
display:flex;
gap:10px;
margin-top:10px;
}

.popupBtns button{
flex:1;
padding:10px;
border-radius:8px;
border:none;
font-size:14px;
cursor:pointer;
}

.postBtn{
background:var(--blue);
color:white;
}

.cancelBtn{
background:#1c1c1c;
color:#bbb;
}

</style>
</head>

<body>

<header>
Nova-Fala
<div class="logout" onclick="logout()">Sair</div>
</header>

<div id="feed"></div>

<div id="plus" onclick="abrirPost()">+</div>

<div class="overlay" id="overlay" onclick="fecharPost()"></div>

<div id="postPopup">

<textarea id="postText" placeholder="O que está acontecendo?" maxlength="1000"></textarea>

<div class="counter" id="contador">0 / 1000</div>

<div class="popupBtns">
<button class="postBtn" onclick="postar()">Postar</button>
<button class="cancelBtn" onclick="fecharPost()">Cancelar</button>
</div>

</div>

<script>

const firebaseConfig={
databaseURL:"https://contaevilution-default-rtdb.firebaseio.com/"
}

firebase.initializeApp(firebaseConfig)
const db=firebase.database()

let user=localStorage.getItem("user") || sessionStorage.getItem("user")

if(user){
localStorage.setItem("user",user)
sessionStorage.setItem("user",user)
}

if(user===null){
location.replace("login.html")
}

function logout(){
localStorage.removeItem("user")
sessionStorage.removeItem("user")
location.href="login.html"
}

function abrirPost(){
overlay.style.display="block"
postPopup.style.bottom="0"
}

function fecharPost(){
overlay.style.display="none"
postPopup.style.bottom="-420px"
}

postText.addEventListener("input",()=>{
contador.innerText=postText.value.length+" / 1000"
})

function linkificar(texto){
return texto.replace(
/(https?:\/\/[^\s]+)/g,
'<a href="$1" target="_blank" style="color:#4da6ff">$1</a>'
)
}

function postar(){
let texto=postText.value.trim()
if(texto=="") return
let post={user:user,text:texto,likes:0,time:Date.now()}
db.ref("posts").push(post)
postText.value=""
contador.innerText="0 / 1000"
fecharPost()
}

function curtir(id,likes){
db.ref("posts/"+id+"/likes").set((likes||0)+1)
}

function comentar(id){
let c=prompt("Comentário")
if(!c) return
db.ref("comments/"+id).push({user:user,text:c})
}

function responder(postId,commentId){
let r=prompt("Responder")
if(!r) return
db.ref("replies/"+postId+"/"+commentId).push({user:user,text:r})
}

function carregarRespostas(postId,commentId,div){
db.ref("replies/"+postId+"/"+commentId)
.on("child_added",snap=>{
let r=snap.val()
let el=document.createElement("div")
el.className="reply"
el.innerText="↳ @"+r.user+" "+r.text
div.appendChild(el)
})
}

function carregarComentarios(id,div){
db.ref("comments/"+id)
.on("child_added",snap=>{
let c=snap.val()
let cid=snap.key
let el=document.createElement("div")
el.className="comment"
el.innerHTML=`
<b>@${c.user}</b> ${linkificar(c.text)}
<br>
<button onclick="responder('${id}','${cid}')">Responder</button>
<div id="r${cid}"></div>
`
div.appendChild(el)
carregarRespostas(id,cid,document.getElementById("r"+cid))
})
}

/* ================== FEED ================== */

let feed=document.getElementById("feed")
let postsArr=[]
let postsCarregados=0
const batchSize=10
let scrollAtual=0

function carregarFeed(){

scrollAtual=window.scrollY

db.ref("posts").once("value").then(snap=>{
let data=snap.val()

postsArr=[]

for(let id in data){

let p=data[id]

if(Date.now()-p.time>5184000000){
db.ref("posts/"+id).remove()
continue
}

postsArr.push({id,...p})

}

postsArr.sort((a,b)=>b.time-a.time)

feed.innerHTML=""
postsCarregados=0

carregarProximoLote()

setTimeout(()=>{
window.scrollTo(0,scrollAtual)
},50)

})
}

function carregarProximoLote(){

const lote=postsArr.slice(postsCarregados,postsCarregados+batchSize)

lote.forEach(p=>{

let div=document.createElement("div")
div.className="post"

div.innerHTML=`
<div class="user">@${p.user}</div>
<div class="text" id="text-${p.id}">${linkificar(p.text)}</div>

<div class="actions">

<button onclick="curtir('${p.id}',${p.likes})">❤️ ${p.likes||0}</button>

<button onclick="comentar('${p.id}')">💬 comentar</button>

${p.user===user ? `
<button onclick="editarPost('${p.id}')">✏️ Editar</button>
<button onclick="deletarPost('${p.id}')">🗑️ Deletar</button>
` : ""}

</div>

<div id="c${p.id}" class="comment-box"></div>
`

feed.appendChild(div)

carregarComentarios(p.id,document.getElementById("c"+p.id))

})

postsCarregados+=lote.length

}

window.addEventListener("scroll",()=>{

if((window.innerHeight+window.scrollY)>=document.body.offsetHeight-100){

carregarProximoLote()

}

})

function deletarPost(id){

if(confirm("Deseja realmente deletar este post?")){

db.ref("posts/"+id).remove()
db.ref("comments/"+id).remove()
db.ref("replies/"+id).remove()

document.getElementById("c"+id).parentElement.remove()

}

}

function editarPost(id){

let textoAtual=document.getElementById("text-"+id).innerText

let novoTexto=prompt("Editar post",textoAtual)

if(novoTexto && novoTexto.trim()!=""){

db.ref("posts/"+id+"/text").set(novoTexto.trim())

document.getElementById("text-"+id).innerHTML=linkificar(novoTexto.trim())

}

}

carregarFeed()

</script>

</body>
</html>
