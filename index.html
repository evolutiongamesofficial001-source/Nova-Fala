<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova-Fala</title>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root{
            --bg:#0b0b0b;
            --card:#121212;
            --border:#1f1f1f;
            --blue:#1da1f2;
            --text:#e8e8e8;
            --sub:#9e9e9e;
        }

        *{box-sizing:border-box;}
        body{
            margin:0;
            font-family:system-ui;
            background:var(--bg);
            color:var(--text);
        }

        header{
            position:sticky;
            top:0;
            background:#0f0f0f;
            padding:14px 16px;
            border-bottom:1px solid var(--border);
            display:flex;
            justify-content:space-between;
            align-items:center;
            font-size:20px;
            font-weight:bold;
            color:var(--blue);
            z-index:10;
        }

        .logout{
            font-size:13px;
            background:#161616;
            border:1px solid var(--border);
            padding:6px 10px;
            border-radius:8px;
            cursor:pointer;
            color:#ccc;
        }

        #feed{
            padding:10px;
            padding-bottom:120px;
        }

        .post{
            background:var(--card);
            border:1px solid var(--border);
            border-radius:14px;
            padding:14px;
            margin-bottom:12px;
            animation:fade .3s;
        }

        .post img{
            width:100%;
            border-radius:10px;
            margin-top:10px;
            cursor:pointer;
        }

        @keyframes fade{
            from{opacity:0;transform:translateY(8px);}
            to{opacity:1;}
        }

        .user{
            font-weight:bold;
            color:#2ee6a6;
            font-size:15px;
        }

        .text{
            margin-top:6px;
            font-size:16px;
            line-height:1.4;
        }

        .actions{
            margin-top:12px;
            display:flex;
            gap:10px;
            flex-wrap:wrap;
        }

        .actions button{
            display:flex;
            align-items:center;
            gap:6px;
            background:#151515;
            border:1px solid #262626;
            padding:6px 12px;
            border-radius:20px;
            font-size:13px;
            color:#d0d0d0;
            cursor:pointer;
            transition:0.2s;
        }

        .actions button:hover{
            background:#1d1d1d;
            transform:scale(1.05);
        }

        .actions button:first-child{
            color:#ff6b81;
            border-color:#2a1a1e;
        }

        #plus{
            position:fixed;
            bottom:20px;
            right:20px;
            width:60px;
            height:60px;
            border-radius:50%;
            background:var(--blue);
            color:white;
            font-size:34px;
            display:flex;
            align-items:center;
            justify-content:center;
            cursor:pointer;
            box-shadow:0 8px 25px #000;
            transition:.2s;
        }

        .overlay{
            position:fixed;
            inset:0;
            background:#0009;
            display:none;
            z-index:100;
        }

        #postPopup{
            position:fixed;
            bottom:-420px;
            left:0;
            right:0;
            background:#111;
            border-top:1px solid var(--border);
            padding:18px;
            transition:.35s;
            border-radius:18px 18px 0 0;
            z-index:101;
        }

        #postPopup textarea{
            width:100%;
            height:90px;
            background:#0c0c0c;
            border:1px solid var(--border);
            border-radius:10px;
            color:white;
            padding:10px;
            font-size:15px;
            resize:none;
        }

        .counter{
            font-size:12px;
            color:#666;
            margin-top:5px;
            text-align:right;
        }

        .popupBtns{
            display:flex;
            gap:10px;
            margin-top:10px;
        }

        .popupBtns button{
            flex:1;
            padding:10px;
            border-radius:8px;
            border:none;
            font-size:14px;
            cursor:pointer;
        }

        .postBtn{
            background:var(--blue);
            color:white;
        }

        .cancelBtn{
            background:#1c1c1c;
            color:#bbb;
        }

        #viewer{
            position:fixed;
            inset:0;
            background:#000;
            display:none;
            align-items:center;
            justify-content:center;
            z-index:999;
            flex-direction:column;
        }

        #viewer img{
            max-width:95%;
            max-height:95%;
            border-radius:10px;
        }

        #closeViewer{
            position:absolute;
            top:20px;
            right:20px;
            background:#111;
            border:1px solid #333;
            color:white;
            font-size:18px;
            padding:8px 12px;
            border-radius:10px;
            cursor:pointer;
        }

        /* Custom Confirm e Prompt */
        #customConfirm, #customPrompt{
            position:fixed;
            inset:0;
            background:#000a;
            display:none;
            align-items:center;
            justify-content:center;
            z-index:9999;
        }

        .confirmBox{
            background:#121212;
            border:1px solid #2a2a2a;
            border-radius:14px;
            padding:20px;
            width:85%;
            max-width:320px;
            color:white;
            animation:fade .2s;
        }

        .confirmText{
            font-size:15px;
            line-height:1.5;
            white-space:pre-line;
        }

        .confirmBox textarea{
            width:100%;
            height:80px;
            margin-top:10px;
            background:#0c0c0c;
            border:1px solid #333;
            border-radius:8px;
            color:white;
            padding:10px;
        }

        .confirmBtns{
            display:flex;
            justify-content:flex-end;
            gap:10px;
            margin-top:20px;
        }

        .confirmBtns button{
            padding:8px 14px;
            border-radius:8px;
            border:none;
            background:#1c1c1c;
            color:#ccc;
            cursor:pointer;
        }

        .confirmBtns .okBtn{
            background:#1da1f2;
            color:white;
        }
    .comment{
margin-top:6px;
font-size:11px; /* menor */
color:var(--sub);
}

.reply{
margin-left:14px;
font-size:10px; /* menor */
color:#777;
}
    </style>
</head>
<body>

<header>
    Nova-Fala
    <div class="logout" onclick="logout()">Sair</div>
</header>

<div id="feed"></div>

<div id="plus" onclick="abrirPost()">+</div>

<div class="overlay" id="overlay" onclick="fecharPost()"></div>

<div id="postPopup">
    <textarea id="postText" placeholder="O que está acontecendo?" maxlength="1000"></textarea>
    <input type="file" id="fotoInput" accept="image/*">
    <div class="counter" id="contador">0 / 1000</div>
    <div class="popupBtns">
        <button class="postBtn" onclick="postar()">Postar</button>
        <button class="cancelBtn" onclick="fecharPost()">Cancelar</button>
    </div>
</div>

<div id="viewer">
    <button id="closeViewer" onclick="fecharImagem()">✕</button>
    <img id="viewerImg">
</div>

<!-- Custom Confirm -->
<div id="customConfirm">
    <div class="confirmBox">
        <div class="confirmText" id="confirmText"></div>
        <div class="confirmBtns">
            <button onclick="fecharConfirm(false)">Cancelar</button>
            <button onclick="fecharConfirm(true)" class="okBtn">OK</button>
        </div>
    </div>
</div>

<!-- Custom Prompt -->
<div id="customPrompt">
    <div class="confirmBox">
        <div class="confirmText" id="promptText"></div>
        <textarea id="promptInput" placeholder="Digite aqui..."></textarea>
        <div class="confirmBtns">
            <button onclick="fecharPrompt(null)">Cancelar</button>
            <button onclick="fecharPrompt(document.getElementById('promptInput').value)" class="okBtn">OK</button>
        </div>
    </div>
</div>
<!-- (seu HTML inteiro acima permanece EXATAMENTE igual, não mexi em nada até o script) -->
<script>
const firebaseConfig={
databaseURL:"https://contaevilution-default-rtdb.firebaseio.com/"
}

firebase.initializeApp(firebaseConfig)
const db=firebase.database()

const fotoDB=firebase.initializeApp({
databaseURL:"https://bigtrio-ip-default-rtdb.firebaseio.com/"
},"fotos").database()

let user=localStorage.getItem("user") || sessionStorage.getItem("user")

if(!user) location.replace("login.html")

/* ================= PROMPT & CONFIRM ================= */

let promptResolve=null
let confirmResolve=null

function customPrompt(msg){
return new Promise(res=>{
promptResolve=res
document.getElementById("promptText").innerText=msg
document.getElementById("promptInput").value=""
document.getElementById("customPrompt").style.display="flex"
})
}

function fecharPrompt(v){
document.getElementById("customPrompt").style.display="none"
if(promptResolve){
promptResolve(v ? v.trim() : null)
promptResolve=null
}
}

function customConfirm(msg){
return new Promise(res=>{
confirmResolve=res
document.getElementById("confirmText").innerText=msg
document.getElementById("customConfirm").style.display="flex"
})
}

function fecharConfirm(v){
document.getElementById("customConfirm").style.display="none"
if(confirmResolve){
confirmResolve(v)
confirmResolve=null
}
}

/* ================= UI ================= */

function abrirPost(){
overlay.style.display="block"
postPopup.style.bottom="0"
}

function fecharPost(){
overlay.style.display="none"
postPopup.style.bottom="-420px"
}

function abrirImagem(src){
viewer.style.display="flex"
viewerImg.src=src
}

function fecharImagem(){
viewer.style.display="none"
viewerImg.src=""
}

/* ================= TEXTO ================= */

function linkificar(texto){
return texto.replace(
/(https?:\/\/[^\s]+)/g,
'<a href="$1" target="_blank" style="color:#4da6ff">$1</a>'
)
}

/* ================= IMAGEM ================= */

function comprimirImagem(file){
return new Promise(resolve=>{
let img=new Image()
let reader=new FileReader()

reader.onload=e=>img.src=e.target.result

img.onload=()=>{
let canvas=document.createElement("canvas")
let max=800
let scale=Math.min(max/img.width,max/img.height,1)

canvas.width=img.width*scale
canvas.height=img.height*scale

let ctx=canvas.getContext("2d")
ctx.drawImage(img,0,0,canvas.width,canvas.height)

resolve(canvas.toDataURL("image/jpeg",0.6))
}

reader.readAsDataURL(file)
})
}

/* ================= POST ================= */

let fotoBase64=null

function postar(){

let texto=postText.value.trim()
let file=fotoInput.files[0]

if(texto=="" && !file) return

let id=db.ref("posts").push().key

function salvarPost(foto){

let post={
user:user,
text:texto,
likes:0,
time:Date.now(),
photoBase64:fotoBase64||null
}

db.ref("posts/"+id).set(post)

postText.value=""
fotoInput.value=""
contador.innerText="0 / 1000"

fotoBase64=null

fecharPost()
}

if(file){

if(!file.type.startsWith("image/")){
alert("Apenas imagens")
return
}

comprimirImagem(file).then(base64=>{
fotoBase64=base64
fotoDB.ref("fotos/"+id).set(base64)
salvarPost()
})

}else{
salvarPost()
}

}

/* ================= LIKE ================= */

function curtir(id){
db.ref("posts/"+id+"/likes").transaction(n=>(n||0)+1)
}

/* ================= COMENTÁRIOS ================= */

async function comentar(id){
let c=await customPrompt("Comentário:")
if(!c) return

db.ref("comments/"+id).push({
user:user,
text:c
})
}

async function responder(postId,commentId){
let r=await customPrompt("Responder:")
if(!r) return

db.ref("replies/"+postId+"/"+commentId).push({
user:user,
text:r
})
}

function carregarRespostas(postId,commentId,div){
db.ref("replies/"+postId+"/"+commentId)
.on("child_added",snap=>{
let r=snap.val()

let el=document.createElement("div")
el.className="reply"
el.innerText="↳ @"+r.user+" "+r.text

div.appendChild(el)
})
}

function carregarComentarios(id,div){
db.ref("comments/"+id)
.on("child_added",snap=>{
let c=snap.val()
let cid=snap.key

let el=document.createElement("div")
el.className="comment"
el.innerHTML=`
<b>@${c.user}</b> ${linkificar(c.text)}
<br>
<button onclick="responder('${id}','${cid}')">Responder</button>
<div id="r${cid}"></div>
`

div.appendChild(el)

carregarRespostas(id,cid,document.getElementById("r"+cid))
})
}

/* ================= RENDER ================= */

let feed=document.getElementById("feed")

function renderPost(id,p){

let div=document.createElement("div")
div.className="post"
div.id="post-"+id

div.innerHTML=`
<div class="user">@${p.user}</div>
<div class="text" id="text-${id}">${linkificar(p.text)}</div>
<div id="img-${id}"></div>

<div class="actions">
<button id="like-${id}" onclick="curtir('${id}')">❤️ ${p.likes||0}</button>
<button onclick="comentar('${id}')">💬 comentar</button>

${p.user===user ? `
<button onclick="editarPost('${id}')">✏️ Editar</button>
<button onclick="deletarPost('${id}')">🗑️ Deletar</button>
` : ""}
</div>

<div id="c${id}" class="comment-box"></div>
`

feed.prepend(div)

if(p.photoBase64){
let img=document.createElement("img")
img.src=p.photoBase64
img.onclick=()=>abrirImagem(p.photoBase64)
document.getElementById("img-"+id).appendChild(img)
}

carregarComentarios(id,document.getElementById("c"+id))
}

/* ================= FEED ================= */

function carregarFeed(){

db.ref("posts").orderByChild("time")
.on("child_added",snap=>{
let id=snap.key
let p=snap.val()

if(Date.now()-p.time>5184000000){
db.ref("posts/"+id).remove()
db.ref("comments/"+id).remove()
db.ref("replies/"+id).remove()
fotoDB.ref("fotos/"+id).remove()
return
}

renderPost(id,p)
})

db.ref("posts").on("child_changed",snap=>{
let id=snap.key
let p=snap.val()

let btn=document.getElementById("like-"+id)
if(btn) btn.innerHTML="❤️ "+(p.likes||0)
})
}

/* ================= AÇÕES ================= */

function deletarPost(id){
customConfirm("Deseja deletar este post?")
.then(ok=>{
if(!ok) return

db.ref("posts/"+id).remove()
db.ref("comments/"+id).remove()
db.ref("replies/"+id).remove()
fotoDB.ref("fotos/"+id).remove()

document.getElementById("post-"+id)?.remove()
})
}

async function editarPost(id){
let atual=document.getElementById("text-"+id).innerText

let novo=await customPrompt("Editar post:\n\n"+atual)

if(novo){
db.ref("posts/"+id+"/text").set(novo)
document.getElementById("text-"+id).innerHTML=linkificar(novo)
}
}

function logout(){
customConfirm("Deseja sair da conta?")
.then(ok=>{
if(!ok) return

localStorage.removeItem("user")
sessionStorage.removeItem("user")
location.href="login.html"
})
}

/* ================= INIT ================= */

postText.addEventListener("input",()=>{
contador.innerText=postText.value.length+" / 1000"
})

carregarFeed()
</script>
</body>
</html>
