<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova-Fala</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<link rel="stylesheet" href="index.css">
</head>

<body>

<header>
    <div style="display:flex;align-items:center;gap:10px;">
        <div onclick="abrirMenu()" style="cursor:pointer;font-size:22px;">☰</div>
        <span>Nova-Fala</span>
    </div>
    
    <div style="display:flex;align-items:center;gap:8px;">
        <div onclick="abrirBusca()" style="cursor:pointer;font-size:20px;" title="Buscar usuários">🔍</div>
        <div class="logout" onclick="logout()">Sair</div>
    </div>
</header>

<!-- ================= BUSCA ================= -->
<div id="buscaOverlay" onclick="fecharBusca()" style="display:none;position:fixed;inset:0;background:#0009;z-index:500;"></div>
<div id="buscaBox" style="display:none;position:fixed;top:60px;left:50%;transform:translateX(-50%);width:90%;max-width:400px;background:#111;border:1px solid #222;border-radius:14px;padding:16px;z-index:501;animation:fade .2s;">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
        <span style="font-size:18px;">🔍</span>
        <input id="buscaInput" type="text" placeholder="Buscar usuário..." oninput="buscarUsuarios(this.value)"
            style="flex:1;background:#0c0c0c;border:1px solid #333;border-radius:8px;padding:9px 12px;color:white;font-size:14px;outline:none;">
        <span onclick="fecharBusca()" style="cursor:pointer;color:#888;font-size:18px;line-height:1;">✕</span>
    </div>
    <div id="buscaResultados" style="max-height:300px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;">
        <div style="color:#555;font-size:13px;text-align:center;">Digite para buscar...</div>
    </div>
</div>

<div id="feed"></div>

<div id="plus" onclick="abrirPost()">+</div>

<div class="overlay" id="overlay" onclick="fecharPost()"></div>

<!-- ================= POPUP POST ================= -->
<div id="postPopup">

    <textarea id="postText" placeholder="O que está acontecendo?" maxlength="1000"></textarea>

    <!-- ================= ENQUETE ================= -->
    <div id="pollBox" style="margin-top:10px;">
        <button onclick="togglePoll()">📊 Criar enquete</button>

        <!-- opções -->
        <div id="pollOptions" style="display:none;margin-top:10px;">
            <input type="text" class="pollInput" placeholder="Opção 1">
            <input type="text" class="pollInput" placeholder="Opção 2">
            <input type="text" class="pollInput" placeholder="Opção 3">
            <input type="text" class="pollInput" placeholder="Opção 4">
            <input type="text" class="pollInput" placeholder="Opção 5">
        </div>

        <!-- tempo -->
        <div id="pollTimeBox" style="margin-top:8px;display:none;">
            <select id="pollTime">
                <option value="3600000">1 hora</option>
                <option value="21600000">6 horas</option>
                <option value="86400000" selected>24 horas</option>
                <option value="259200000">3 dias</option>
                <option value="604800000">7 dias</option>
            </select>
        </div>
    </div>
    <!-- ================= FIM ENQUETE ================= -->

    <!-- upload -->
    <label class="uploadBox">
        <input type="file" id="fotoInput" accept="image/*" hidden>
        <div id="uploadVisual">📷 Escolher foto</div>
    </label>

    <img id="previewImg" style="display:none;">

    <div class="counter" id="contador">0 / 1000</div>

    <div class="popupBtns">
        <button class="postBtn" onclick="postar()">Postar</button>
        <button class="cancelBtn" onclick="fecharPost()">Cancelar</button>
    </div>
</div>
<!-- ================= FIM POPUP ================= -->

<!-- ================= VIEWER ================= -->
<div id="viewer">
    <button id="closeViewer" onclick="fecharImagem()">✕</button>
    <img id="viewerImg">
</div>

<!-- ================= CONFIRM ================= -->
<div id="customConfirm">
    <div class="confirmBox">
        <div class="confirmText" id="confirmText"></div>
        <div class="confirmBtns">
            <button onclick="fecharConfirm(false)">Cancelar</button>
            <button onclick="fecharConfirm(true)" class="okBtn">OK</button>
        </div>
    </div>
</div>

<!-- ================= PROMPT ================= -->
<div id="customPrompt">
    <div class="confirmBox">
        <div class="confirmText" id="promptText"></div>
        <textarea id="promptInput" placeholder="Digite aqui..."></textarea>
        <div class="confirmBtns">
            <button onclick="fecharPrompt(null)">Cancelar</button>
            <button onclick="fecharPrompt(document.getElementById('promptInput').value)" class="okBtn">OK</button>
        </div>
    </div>
</div>

<!-- ================= MENU ================= -->
<div id="menuOverlay" onclick="fecharMenu()"></div>

<div id="menuLateral">
    <div class="menuHeader">
        Menu
        <span onclick="fecharMenu()">✕</span>
    </div>

    <button onclick="abrirConfig()">⚙️ Configurações</button>
    <button onclick="abrirMeuPerfil()">👤 Meu Perfil</button>
    <button onclick="abrirSAR()">🤖 S.A.R</button>
</div>

<!-- ================= CONFIG ================= -->
<div id="configOverlay" onclick="fecharConfig()"></div>

<div id="configBox">
    <div class="menuHeader">
        Configurações
        <span onclick="fecharConfig()">✕</span>
    </div>

    <b>Tema</b>
    <div class="temaOpcoes">
        <button id="btnEscuro" onclick="setTema('escuro')">🌙 Escuro</button>
        <button id="btnClaro" onclick="setTema('claro')">☀️ Claro</button>
    </div>
</div>

<script src="index.js"></script>

</body>
</html>
