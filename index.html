<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova-Fala</title>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<link rel="stylesheet" href="index.css">
</head>

<body>

<header>
    <div style="display:flex;align-items:center;gap:10px;">
        <div onclick="abrirMenu()" style="cursor:pointer;font-size:22px;">☰</div>
        <span>Nova-Fala</span>
    </div>
    
    <div class="logout" onclick="logout()">Sair</div>
</header>

<div id="feed"></div>

<div id="plus" onclick="abrirPost()">+</div>

<div class="overlay" id="overlay" onclick="fecharPost()"></div>

<div id="postPopup">
    <textarea id="postText" placeholder="O que está acontecendo?" maxlength="1000"></textarea>

    <label class="uploadBox">
        <input type="file" id="fotoInput" accept="image/*" hidden>
        <div id="uploadVisual">📷 Escolher foto</div>
    </label>

    <img id="previewImg" style="display:none;">

    <div class="counter" id="contador">0 / 1000</div>

    <div class="popupBtns">
        <button class="postBtn" onclick="postar()">Postar</button>
        <button class="cancelBtn" onclick="fecharPost()">Cancelar</button>
    </div>
</div>

<div id="viewer">
    <button id="closeViewer" onclick="fecharImagem()">✕</button>
    <img id="viewerImg">
</div>

<div id="customConfirm">
    <div class="confirmBox">
        <div class="confirmText" id="confirmText"></div>
        <div class="confirmBtns">
            <button onclick="fecharConfirm(false)">Cancelar</button>
            <button onclick="fecharConfirm(true)" class="okBtn">OK</button>
        </div>
    </div>
</div>

<div id="customPrompt">
    <div class="confirmBox">
        <div class="confirmText" id="promptText"></div>
        <textarea id="promptInput" placeholder="Digite aqui..."></textarea>
        <div class="confirmBtns">
            <button onclick="fecharPrompt(null)">Cancelar</button>
            <button onclick="fecharPrompt(document.getElementById('promptInput').value)" class="okBtn">OK</button>
        </div>
    </div>
</div>

<div id="menuOverlay" onclick="fecharMenu()"></div>

<div id="menuLateral">
    <div class="menuHeader">
        Menu
        <span onclick="fecharMenu()">✕</span>
    </div>

    <button onclick="abrirConfig()">⚙️ Configurações</button>
    <button onclick="abrirMeuPerfil()">👤 Meu Perfil</button>
    <button onclick="abrirSAR()">🤖 S.A.R</button>
</div>

<div id="configOverlay" onclick="fecharConfig()"></div>

<div id="configBox">
    <div class="menuHeader">
        Configurações
        <span onclick="fecharConfig()">✕</span>
    </div>

    <b>Tema</b>
    <div class="temaOpcoes">
        <button id="btnEscuro" onclick="setTema('escuro')">🌙 Escuro</button>
        <button id="btnClaro" onclick="setTema('claro')">☀️ Claro</button>
    </div>
</div>

<script src="index.js"></script>

</body>
</html>
